databases:
  - name: asset-reporting-db
    databaseName: asset_reporting
    user: db_user
    plan: free

services:
  - type: web
    name: asset-reporting-app
    env: docker
    plan: free
    port: 80
    healthCheckPath: /
    region: singapore # Change this to your preferred region (e.g., singapore, oregon, frankfurt)
    envVars:
      - key: PORT
        value: 80
      - key: APP_KEY
        sync: false # Set this in the Render dashboard manually
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: SESSION_DRIVER
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: asset-reporting-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromDatabase:
          name: asset-reporting-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: asset-reporting-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: asset-reporting-db
          property: password
      - key: APP_URL
        fromService:
          type: web
          name: asset-reporting-app
          property: host
    # Run migrations during the pre-deploy stage (safer)
    preDeployCommand: "php artisan migrate --force"
