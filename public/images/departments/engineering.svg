<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="engGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Gear Background -->
  <circle cx="200" cy="150" r="120" fill="url(#engGrad)" filter="url(#shadow)"/>
  <circle cx="200" cy="150" r="40" fill="#f8fafc"/>
  
  <!-- Road Markings -->
  <path d="M180,150 L220,150 M200,130 L200,170" stroke="#f8fafc" stroke-width="20"/>
  
  <!-- Construction Hat/Cone Orange Accent -->
  <path d="M200,80 L240,150 L160,150 Z" fill="#f59e0b"/>
</svg>
