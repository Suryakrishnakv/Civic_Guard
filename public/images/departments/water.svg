<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Water Drop Shape -->
  <path d="M200,50 
           Q280,150 280,200 
           A80,80 0 1,1 120,200 
           Q120,150 200,50 Z" 
        fill="url(#waterGrad)" filter="url(#shadow)"/>
        
  <!-- Shine -->
  <path d="M160,150 Q160,180 180,200" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
