<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="elecGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shield/Circle Background -->
  <circle cx="200" cy="150" r="110" fill="#1e293b" filter="url(#shadow)"/>
  
  <!-- Lightning Bolt -->
  <path d="M220,50 L160,150 L200,150 L180,250 L260,130 L210,130 L220,50 Z" fill="url(#elecGrad)" stroke="white" stroke-width="4"/>
</svg>
